<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World News</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <main class="site-shell">
        <header class="masthead">
            <div>
                <p class="eyebrow">World News</p>
                <h1 class="site-title">A live front page for what is moving now.</h1>
                <p class="site-subtitle">Broad world coverage from indexed sources, built for fast scanning and deeper reading.</p>
            </div>
            <div class="status-card" aria-live="polite">
                <span class="status-label">Updated</span>
                <strong id="last-updated">Loading</strong>
                <span id="data-source">Connecting</span>
            </div>
        </header>

        <section class="controls" aria-label="News controls">
            <label>
                <span>Search</span>
                <input id="search-input" type="search" placeholder="Search headlines, sources, or summaries">
            </label>
            <label>
                <span>Country</span>
                <select id="country-select">
                    <option value="">All countries</option>
                </select>
            </label>
            <label>
                <span>Source</span>
                <select id="source-select">
                    <option value="">All sources</option>
                </select>
            </label>
            <label>
                <span>Time</span>
                <select id="hours-select">
                    <option value="12">Last 12 hours</option>
                    <option value="24">Last 24 hours</option>
                    <option value="48">Last 48 hours</option>
                    <option value="72" selected>Last 72 hours</option>
                    <option value="168">Last 7 days</option>
                    <option value="720">Last 30 days</option>
                </select>
            </label>
            <label>
                <span>Sort</span>
                <select id="sort-select">
                    <option value="newest">Newest</option>
                    <option value="source">Source</option>
                    <option value="country">Country</option>
                </select>
            </label>
        </section>

        <section class="lead-section" aria-label="Lead story">
            <article class="lead-story" id="lead-story"></article>
        </section>

        <section class="feed-section">
            <div class="section-heading">
                <h2>Latest Stories</h2>
                <span id="result-count">Loading stories</span>
            </div>
            <div class="story-grid" id="story-grid"></div>
            <div class="empty-state" id="empty-state" hidden>No stories match the current filters.</div>
            <button class="load-more" id="load-more" type="button" hidden>Load more</button>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}" defer></script>
</body>
</html>
